<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOTEX x STYLO v1.0</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<!-- ✅ Monetag MultiTag (HEAD me lagao) -->
<!-- Yaha Monetag ka official multitags script paste karo -->
<!-- Example:
<script src="https://monetag.com/tag.js"></script>
-->

</head>
<body>

<div class="app-header">
    <div>NOTEX x STYLO v1.0</div>
    <div>⋮</div>
</div>

<!-- PAGE 1 -->
<div id="page1" class="page active">
    <div class="glass-card">

        <h1>NOTEX x STYLO</h1>
        <p class="security">🔐 Security Verification...</p>

        <div class="loader">
            <div class="loader-bar"></div>
        </div>

        <button class="telegram-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
            Join Telegram
        </button>

        <button id="startBtn" class="start-btn">
            Start Prediction
        </button>

        <!-- ✅ Native Ad Placeholder -->
        <div class="native-ad">
            Native Ad Space (Monetag Native Code Yaha Lagao)
        </div>

    </div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">

    <div class="glass-card">

        <h2>Prediction Engine</h2>
        <p id="userId"></p>

        <div class="prediction-box">
            <div>Current Period: <span id="currentPeriod">-----</span></div>
            <div>Next Period: <span id="nextPeriod">-----</span></div>
            <div>Result: <span id="prediction">WAITING</span></div>
            <div>Time Left: <span id="timer">10:00</span></div>
        </div>

        <button id="startPrediction" class="start-btn">
            Start 10 Minute Session
        </button>

        <div class="history-box">
            <h3>Latest Results</h3>
            <table>
                <thead>
                    <tr>
                        <th>Period</th>
                        <th>Number</th>
                        <th>Size</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>

    </div>
</div>

<!-- ✅ Bottom Banner Ad -->
<div class="bottom-ad">
    Monetag Banner Ad Space (320x50)
</div>

<script src="script.js"></script>
</body>
</html>
